<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEAT PRO - Production Department System</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Core Layout
                        sidebar: '#2E3338', 

                        // Active Menu Gradient
                        menuStart: '#A91B18',
                        menuEnd: '#96291C',

                        // Functional Palette
                        primary: '#C22D2E',     // Deep Red
                        primaryLight: '#E79796', // Soft Red
                        secondary: '#BB8588',   // Old Rose
                        accent: '#DCBC1B',      // Vivid Gold
                        success: '#537E72',     // Deep Sea Green
                        successLight: '#CDDECB', // Pale Green
                        warning: '#D8A48F',     // Terracotta
                        info: '#55738D',        // Slate Blue
                        infoLight: '#90B7BF',   // Soft Blue

                        // Neutrals & Backgrounds
                        bgBase: '#F2F4F6',      // Brighter Light Gray
                        bgBlend: '#E6E1DB',     // Very Light Warm Beige
                        cardBg: '#EFEBCE',      // Cream
                        textMain: '#2E395F',    // Navy
                        textMuted: '#737597',   // Periwinkle Gray

                        // Additional Palette
                        sage: '#C6C09C',
                        olive: '#616852',
                        teal: '#184F61',
                        bronze: '#B06821'
                    },
                    fontFamily: { 
                        sans: ['"JetBrains Mono"', '"Noto Sans Thai"', 'sans-serif'],
                        brand: ['"Inter"', '"Noto Sans Thai"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace']
                    },
                    boxShadow: {
                        'soft': '0 8px 30px rgba(0, 0, 0, 0.04)',
                        'grand': '0 20px 50px rgba(46, 57, 95, 0.15)',
                        'glow': '0 0 15px rgba(194, 45, 46, 0.3)', 
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        },
                        fadeIn: {
                            'from': { opacity: '0', transform: 'translateY(10px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' }
                        }
                    },
                    animation: {
                        shimmer: 'shimmer 1.5s infinite',
                        fadeIn: 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background: linear-gradient(135deg, #F2F4F6 0%, #E6E1DB 100%);
            color: #2E395F; 
            overflow: hidden;
            font-family: "JetBrains Mono", "Noto Sans Thai", sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(46, 57, 95, 0.1); border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(194, 45, 46, 0.5); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
